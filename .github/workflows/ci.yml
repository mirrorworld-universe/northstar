name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/ensure-rust-toolchain
      - run: rustup toolchain install nightly --component rustfmt
      - run: cargo +nightly fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/ensure-rust-toolchain
      - name: Clean stale build artifacts
        run: |
          pkill -9 rustc || true
          pkill -9 cargo || true
          rm -rf target
          rm -rf ~/.cargo/registry/src/**/.cargo-lock*
      - run: rustup component add clippy
      - uses: Swatinem/rust-cache@v2
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler libprotobuf-dev libudev-dev libclang-dev
      - run: cargo clippy --all --tests -- -D warnings

  test:
    name: Test (${{ matrix.package }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package:
          - northstar
          - northstar-portal
          - solana-svm
          - solana-core
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/ensure-rust-toolchain
      - name: Clean stale build artifacts
        run: |
          pkill -9 rustc || true
          pkill -9 cargo || true
          rm -rf target
          rm -rf ~/.cargo/registry/src/**/.cargo-lock*
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.package }}
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler libprotobuf-dev libudev-dev libclang-dev
      - name: Install Solana tools
        if: ${{ matrix.package == 'northstar' || matrix.package == 'northstar-portal' }}
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/stable/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH
      - name: Read Solana platform-tools version
        if: ${{ matrix.package == 'northstar' || matrix.package == 'northstar-portal' }}
        id: solana_tools
        run: |
          cargo build-sbf --version
          version=$(cargo build-sbf --version | awk '/platform-tools/{print $2}')
          echo "platform_tools_version=$version" >> "$GITHUB_OUTPUT"
      - name: Cache Solana platform tools
        if: ${{ matrix.package == 'northstar' || matrix.package == 'northstar-portal' }}
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/solana
            ~/.local/share/solana/install/active_release/bin/platform-tools-sdk/sbf/dependencies/platform-tools
          key: ${{ runner.os }}-solana-platform-tools-v3-${{ steps.solana_tools.outputs.platform_tools_version }}-${{ matrix.package }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-solana-platform-tools-v3-${{ steps.solana_tools.outputs.platform_tools_version }}-${{ matrix.package }}-
            ${{ runner.os }}-solana-platform-tools-v3-${{ steps.solana_tools.outputs.platform_tools_version }}-
      - run: cargo test -p ${{ matrix.package }} --no-fail-fast
