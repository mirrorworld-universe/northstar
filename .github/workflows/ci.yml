name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: rustup toolchain install nightly --component rustfmt
      - run: cargo +nightly fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: rustup component add clippy
      - uses: Swatinem/rust-cache@v2
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler libprotobuf-dev libudev-dev libclang-dev
      - name: Install Solana tools
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/stable/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH
      - name: Cache Solana platform tools
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/solana
            ~/.local/share/solana/install/releases/*/solana-release/bin/platform-tools-sdk
          key: ${{ runner.os }}-solana-platform-tools-v2-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-solana-platform-tools-v2-
      - run: cargo clippy --all --tests -- -D warnings

  test:
    name: Test
    runs-on: [self-hosted, devnet]
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler libprotobuf-dev libudev-dev libclang-dev
      - name: Install Solana tools
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/stable/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH
      - name: Cache Solana platform tools
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/solana
            ~/.local/share/solana/install/releases/*/solana-release/bin/platform-tools-sdk
          key: ${{ runner.os }}-solana-platform-tools-v2-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-solana-platform-tools-v2-
      - run: cargo test -p solana-core -p northstar -p northstar-portal --no-fail-fast
