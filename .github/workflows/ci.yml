name: CI

on:
  push:
    branches: [master, main, release]
  pull_request:
    branches: [master, main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/release' }}

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/ensure-rust-toolchain
      - run: rustup toolchain install nightly --component rustfmt
      - run: cargo +nightly fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/ensure-rust-toolchain
      - name: Clean stale build artifacts
        run: |
          pkill -9 rustc || true
          pkill -9 cargo || true
          rm -rf target
          rm -rf ~/.cargo/registry/src/**/.cargo-lock*
      - run: rustup component add clippy
      - uses: Swatinem/rust-cache@v2
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler libprotobuf-dev libudev-dev libclang-dev
      - run: cargo clippy --all --tests -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/ensure-rust-toolchain
      - name: Clean stale build artifacts
        run: |
          pkill -9 rustc || true
          pkill -9 cargo || true
          rm -rf target
          rm -rf ~/.cargo/registry/src/**/.cargo-lock*
      - uses: Swatinem/rust-cache@v2
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler libprotobuf-dev libudev-dev libclang-dev
      - name: Install Solana tools
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/stable/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> "$GITHUB_PATH"
      - name: Read Solana platform-tools version
        id: solana_tools
        run: |
          cargo build-sbf --version
          version=$(cargo build-sbf --version | awk '/platform-tools/{print $2}')
          echo "platform_tools_version=$version" >> "$GITHUB_OUTPUT"
      - name: Cache Solana platform tools
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/solana
            ~/.local/share/solana/install/active_release/bin/platform-tools-sdk/sbf/dependencies/platform-tools
          key: ${{ runner.os }}-solana-platform-tools-v3-${{ steps.solana_tools.outputs.platform_tools_version }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-solana-platform-tools-v3-${{ steps.solana_tools.outputs.platform_tools_version }}-
      - name: Run Northstar crate tests
        run: cargo test -p northstar -p northstar-portal --no-fail-fast
      - name: Run Northstar SVM regression tests
        run: cargo test -p solana-svm northstar --no-fail-fast
      - name: Run Northstar core service tests
        run: cargo test -p solana-core northstar_service --no-fail-fast

  deploy:
    name: Build and Deploy on Devnet
    needs: [fmt, clippy, test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/release'
    runs-on: [devnet]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/ensure-rust-toolchain

      - name: Build portal SBF program
        run: ./cargo-build-sbf --manifest-path northstar/programs/portal/Cargo.toml

      - name: Build validator binary
        run: cargo build --release --target-dir /home/ubuntu/northstar/ --bin agave-validator

      - name: Confirm binary exists
        run: |
          BIN="/home/ubuntu/northstar/release/agave-validator"
          test -f "$BIN" && test -x "$BIN" && "$BIN" --version

      - name: Restart validator
        run: sudo systemctl restart northstar-validator

      - name: Wait for validator to be fully up
        run: |
          sudo mkdir -p /home/ubuntu/northstar/logs
          sudo touch /home/ubuntu/northstar/logs/validator.log
          sudo chmod a+rw /home/ubuntu/northstar/logs/validator.log

          # Stream validator logs to CI output while we wait
          tail -f /home/ubuntu/northstar/logs/validator.log &
          TAIL_PID=$!

          # shellcheck disable=SC2329
          cleanup() {
            kill "$TAIL_PID" 2>/dev/null || true
            wait "$TAIL_PID" 2>/dev/null || true
          }
          trap cleanup EXIT

          sleep 2

          echo "Waiting for validator to be fully up..."
          for _ in $(seq 1 1080); do
            if sudo systemctl is-failed --quiet northstar-validator; then
              echo ""
              echo "Validator service failed during startup!"
              exit 1
            fi

            if sudo systemctl is-active --quiet northstar-validator; then
              if curl -sf -X POST -H "Content-Type: application/json" \
                 -d '{"jsonrpc":"2.0","id":1,"method":"getVersion"}' \
                 http://localhost:8899 >/dev/null 2>&1; then
                echo ""
                echo "Validator is up and RPC is responding!"
                exit 0
              fi
            fi
            sleep 5
          done

          echo ""
          echo "Timed out waiting for validator to be fully up"
          exit 1
        timeout-minutes: 90
